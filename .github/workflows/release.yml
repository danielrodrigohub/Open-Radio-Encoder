name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install portaudio lame twolame libogg libvorbis opus flac \
            libshout libsamplerate fdk-aac 2>/dev/null || true

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" 2>&1 | tail -50

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu) 2>&1 | tail -50

      - name: Package DMG
        run: |
          APP=$(find build -name "*.app" -type d -maxdepth 4 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            echo "Found app: $APP"
            hdiutil create -volname "OpenRadioEncoder" \
              -srcfolder "$APP" -ov -format UDZO OpenRadioEncoder-macOS.dmg
          else
            echo "No .app bundle found"
            find build -name "*.app" -type d 2>/dev/null || echo "No app bundles"
            find build -name "Open*Radio*" -type f 2>/dev/null || echo "No binaries"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: OpenRadioEncoder-macOS.dmg

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install pkg-config (choco)
        shell: pwsh
        run: choco install pkgconfiglite -y --no-progress

      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install portaudio mp3lame twolame opus libvorbis libogg flac \
            libshout libsamplerate openssl --triplet x64-windows || true
          vcpkg install fdk-aac --triplet x64-windows || true

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" 2>&1 | tail -50

      - name: Build
        run: cmake --build build --config Release -j$(nproc) 2>&1 | tail -50

      - name: Package (NSIS Installer)
        run: |
          cmake --install build --config Release --prefix install
          cpack -C Release --config build/CPackConfig.cmake -G NSIS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: OpenRadioEncoder-*-win64.exe

  build-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential pkg-config \
            libportaudio2 portaudio19-dev \
            libmp3lame-dev libtwolame-dev \
            libopus-dev libvorbis-dev libogg-dev \
            libflac-dev libfdk-aac-dev \
            libshout3-dev libsamplerate0-dev \
            libssl-dev \
            libfreetype-dev libfontconfig-dev \
            libcurl4-openssl-dev libasound2-dev \
            libx11-dev libxcomposite-dev libxext-dev libxrandr-dev \
            libxinerama-dev libglu1-mesa-dev libxcursor-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release 2>&1 | tail -50

      - name: Build
        run: cmake --build build --config Release -j$(nproc) 2>&1 | tail -50

      - name: Package
        run: |
          BIN="build/OpenRadioEncoder_artefacts/Release/OpenRadioEncoder"
          if [ -f "$BIN" ]; then
            mkdir -p release && cp "$BIN" release/ && \
              tar -czf OpenRadioEncoder-ubuntu.tar.gz -C release .
          else
            echo "Binary not found at $BIN"
            find build -name "OpenRadio*" -type f 2>/dev/null || echo "No binaries found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build
          path: OpenRadioEncoder-ubuntu.tar.gz

  release:
    needs: [build-macos, build-windows, build-ubuntu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Open Radio Encoder v${{ github.ref_name }}"
          body: |
            ## Open Radio Encoder ${{ github.ref_name }}

            Multi-station internet radio streaming encoder. Made in Chile with Love!

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (x86_64 + arm64) | `OpenRadioEncoder-macOS.dmg` |
            | Windows (x64) | `OpenRadioEncoder-*-win64.exe` (Installer) |
            | Ubuntu / Linux (x64) | `OpenRadioEncoder-ubuntu.tar.gz` |

            ### CLI Flags

            - `-h, --help` — Show help
            - `-v, --version` — Show version
            - `-c, --config <path>` — Custom config path
            - `--headless` — No GUI mode
            - `--verbose` — Verbose logging

            ### Build from Source

            See [README.md](https://github.com/danielrodrigohub/Open-Radio-Encoder/blob/main/README.md) for build instructions.
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            *.dmg
            *.zip
            *.tar.gz
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
